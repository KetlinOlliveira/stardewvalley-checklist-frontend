<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../assets/css/guia-css.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <title>Guia Centro Comunitário</title>
</head>
<body>
   <div class="camada-conteudo">
    
    <div id="carrossel-viewport">
        
        <button class="btn-seta btn-esq" onclick="mudarCategoria(-1)">◀</button>
        <button class="btn-seta btn-dir" onclick="mudarCategoria(1)">▶</button>
        
        <div id="carrossel-trilho">
            </div>

    </div>

    <div id="area-arvore">
        <div class="arvore-wrapper">
            <img src="../assets/images/tree.png" alt="Árvore" class="imagem-arvore">
            <div id="arvore-botoes-container"></div>
        </div>
    </div>

    <div id="modal-item" class="modal-escondido">
        <div class="modal-conteudo">
            <button onclick="fecharModal()">X</button>
            <h2 id="modal-titulo">Carregando...</h2>
            <img id="modal-imagem" src="" alt="">
            <p id="modal-descricao"></p>
            <p><strong>Como obter: </strong> <span id="modal-como-obter"></span></p>
        </div>
    </div>

</div>
    <script src="../assets/js/script.js"></script>
</body>
</html>
